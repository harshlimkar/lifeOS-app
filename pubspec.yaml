name: lifeos
description: "LifeOS - Your Futuristic Self-Improvement Operating System"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # Local storage
  shared_preferences: ^2.3.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI & Animations
  animate_do: ^3.3.4
  flutter_animate: ^4.5.0
  lottie: ^3.1.3
  percent_indicator: ^4.2.3
  fl_chart: ^0.70.2

  # Supabase Cloud
  supabase_flutter: ^2.6.0

  # URL Launcher (for app update download link)
  url_launcher: ^6.3.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  table_calendar: ^3.1.3
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

  # Icons & Fonts
  google_fonts: ^6.2.1
  font_awesome_flutter: ^10.8.0
  flutter_timezone: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/

flutter_launcher_icons:
  android: "ic_launcher"
  image_path: "assets/images/logo.png"
  web:
    generate: true
    image_path: "assets/images/logo.png"
    background_color: "#050A0F"
    theme_color: "#00FF88"

dependency_overrides:
  app_links: 6.3.2
